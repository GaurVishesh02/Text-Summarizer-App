<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Distill — Text Summarizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink: #14171c;
  --panel: #1b1f27;
  --panel-raised: #232833;
  --line: rgba(243,241,234,0.09);
  --line-strong: rgba(243,241,234,0.2);
  --text: #f3f1ea;
  --text-muted: #8a8f98;
  --gold: #e3a64c;
  --gold-soft: rgba(227,166,76,0.14);
  --gold-dim: rgba(227,166,76,0.4);
  --teal: #4fbdaa;
  --teal-soft: rgba(79,189,170,0.14);
}

*{ box-sizing: border-box; }

@media (prefers-reduced-motion: reduce){
  *{ animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
}

html{ color-scheme: dark; }

body{
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(1100px 560px at 12% -8%, rgba(227,166,76,0.07), transparent 60%),
    radial-gradient(900px 520px at 105% 8%, rgba(79,189,170,0.06), transparent 55%),
    var(--ink);
  color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  display: flex;
  justify-content: center;
  padding: 72px 24px 100px;
}

.page{
  width: 100%;
  max-width: 880px;
}

/* ---------- header ---------- */

.eyebrow{
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--gold);
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
}

.eyebrow::before{
  content: "";
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 0 3px var(--gold-soft);
}

h1{
  font-family: 'Fraunces', serif;
  font-weight: 500;
  font-size: 50px;
  line-height: 1.06;
  letter-spacing: -0.015em;
  margin: 0 0 12px;
}

h1 em{
  font-style: italic;
  font-weight: 400;
  color: var(--teal);
}

p.lede{
  font-size: 15.5px;
  line-height: 1.75;
  color: var(--text-muted);
  max-width: 50ch;
  margin: 0 0 56px;
}

/* ---------- the still: two vessels joined by a rail ---------- */

.still{
  display: grid;
  grid-template-columns: 1fr 28px 1fr;
  align-items: stretch;
  gap: 0;
}

.vessel{
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 26px 26px 24px;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.vessel-label{
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.vessel-label .tag{
  color: var(--ink);
  background: var(--gold);
  padding: 3px 9px;
  border-radius: 20px;
  font-weight: 500;
}

.vessel--output .vessel-label .tag{
  background: var(--teal-soft);
  color: var(--teal);
}

textarea{
  width: 100%;
  flex: 1;
  min-height: 260px;
  resize: vertical;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  line-height: 1.7;
  outline: none;
  padding: 0;
}

textarea::placeholder{ color: var(--text-muted); }

.vessel:focus-within{
  border-color: var(--gold-dim);
}

.vessel--output:focus-within{ border-color: var(--line); }

.charcount{
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  text-align: right;
  margin-top: 10px;
  min-height: 14px;
}

/* the rail connecting the two vessels — visible on wide screens only */
.rail{
  position: relative;
  align-self: center;
  height: 2px;
  background: var(--line-strong);
  margin: 0 -1px;
}

.rail::before, .rail::after{
  content: "";
  position: absolute;
  top: 50%;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  transform: translateY(-50%);
}
.rail::before{ left: -3px; background: var(--gold); box-shadow: 0 0 0 3px var(--ink); }
.rail::after{ right: -3px; background: var(--teal); box-shadow: 0 0 0 3px var(--ink); }

.droplet{
  position: absolute;
  top: 50%;
  left: 0;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--gold);
  transform: translate(-50%, -50%);
  opacity: 0;
}

.still.is-processing .droplet{
  opacity: 1;
  animation: travel 1.1s ease-in-out infinite;
}

@keyframes travel{
  0%   { left: 0%;   opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 1; }
  100% { left: 100%; opacity: 0; }
}

/* ---------- controls row ---------- */

.controls{
  display: flex;
  align-items: center;
  gap: 16px;
  margin-top: 22px;
  flex-wrap: wrap;
}

button[type="submit"]{
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--gold);
  color: #241a08;
  border: none;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 14px 24px;
  border-radius: 8px;
  cursor: pointer;
  transition: transform 0.12s ease, background 0.15s ease, box-shadow 0.15s ease;
}

button[type="submit"] .arrow{ transition: transform 0.2s ease; }
button[type="submit"]:hover .arrow{ transform: translateX(3px); }
button[type="submit"]:hover{ background: #edb562; box-shadow: 0 0 0 4px var(--gold-soft); }
button[type="submit"]:active{ transform: scale(0.98); }
button[type="submit"]:disabled{ opacity: 0.55; cursor: progress; }
button[type="submit"]:disabled:hover{ background: var(--gold); box-shadow: none; }

.ghost-btn{
  background: transparent;
  border: 1px solid var(--line-strong);
  color: var(--text-muted);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.04em;
  padding: 12px 16px;
  border-radius: 8px;
  cursor: pointer;
  transition: border-color 0.15s ease, color 0.15s ease;
}

.ghost-btn:hover{ border-color: var(--teal); color: var(--teal); }

.proof{
  margin-left: auto;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--text-muted);
  display: none;
  align-items: center;
  gap: 8px;
}

.proof.visible{ display: flex; }

.proof strong{ color: var(--teal); font-weight: 500; }

/* ---------- responsive ---------- */

@media (max-width: 760px){
  .still{ grid-template-columns: 1fr; gap: 18px; }
  .rail{ display: none; }
  h1{ font-size: 38px; }
  body{ padding: 48px 18px 80px; }
  .proof{ margin-left: 0; width: 100%; }
}

/* ---------- footer ---------- */

footer{
  margin-top: 64px;
  padding-top: 22px;
  border-top: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--text-muted);
}

footer a{
  color: var(--teal);
  text-decoration: none;
}

footer a:hover{ text-decoration: underline; }
</style>
</head>
<body>
<div class="page">

    <div class="eyebrow">T5 · fine-tuned</div>
    <h1>Distill your text<br>to its <em>essence</em>.</h1>
    <p class="lede">Paste a transcript, article, or conversation. The model reduces it to what actually matters — nothing more.</p>

    <form id="summarization-form">
        <div class="still" id="still">
            <div class="vessel vessel--input">
                <div class="vessel-label">
                    <span>Raw material</span>
                    <span class="tag">Input</span>
                </div>
                <textarea id="dialogue-input" placeholder="Paste or write your content here…" required></textarea>
                <div class="charcount" id="input-count"></div>
            </div>

            <div class="rail">
                <div class="droplet"></div>
            </div>

            <div class="vessel vessel--output">
                <div class="vessel-label">
                    <span>Distillate</span>
                    <span class="tag">Summary</span>
                </div>
                <p id="summary-text"></p>
            </div>
        </div>

        <div class="controls">
            <button type="submit" id="submit-btn"><span>Distill</span><span class="arrow">→</span></button>
            <button type="button" class="ghost-btn" id="clear-btn">Clear</button>
            <button type="button" class="ghost-btn" id="copy-btn" style="display:none;">Copy summary</button>
            <div class="proof" id="proof"><span>Reduced by</span><strong id="proof-value">—</strong></div>
        </div>
    </form>

    <footer>
        <span>&copy; <span id="year"></span> Vishesh Gaur. All rights reserved.</span>
        <span>Built with FastAPI &amp; T5 · <a href="https://github.com/GaurVishesh02/Text-Summarizer-App" target="_blank" rel="noopener">View on GitHub</a></span>
    </footer>

</div>

<script>
document.getElementById("year").textContent = new Date().getFullYear();

const form = document.getElementById("summarization-form");
const dialogueInput = document.getElementById("dialogue-input");
const summaryText = document.getElementById("summary-text");
const submitButton = document.getElementById("submit-btn");
const clearButton = document.getElementById("clear-btn");
const copyButton = document.getElementById("copy-btn");
const still = document.getElementById("still");
const inputCount = document.getElementById("input-count");
const proof = document.getElementById("proof");
const proofValue = document.getElementById("proof-value");

function updateCount(){
    const n = dialogueInput.value.trim().length;
    inputCount.textContent = n ? `${n.toLocaleString()} characters` : "";
}
dialogueInput.addEventListener("input", updateCount);

clearButton.addEventListener("click", () => {
    dialogueInput.value = "";
    summaryText.textContent = "";
    updateCount();
    proof.classList.remove("visible");
    copyButton.style.display = "none";
    dialogueInput.focus();
});

copyButton.addEventListener("click", async () => {
    try {
        await navigator.clipboard.writeText(summaryText.textContent);
        const original = copyButton.textContent;
        copyButton.textContent = "Copied";
        setTimeout(() => { copyButton.textContent = original; }, 1400);
    } catch (e) { /* clipboard unavailable, ignore */ }
});

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const dialogue = dialogueInput.value.trim();
    if (!dialogue) return;

    summaryText.textContent = "";
    proof.classList.remove("visible");
    copyButton.style.display = "none";
    submitButton.disabled = true;
    still.classList.add("is-processing");

    try {
        const response = await fetch("/summarize/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ dialogue }),
        });

        if (!response.ok) {
            throw new Error(`Server error: ${response.status}`);
        }

        const data = await response.json();
        const summary = data.summary || "No summary returned.";
        summaryText.textContent = summary;

        if (data.summary) {
            const reduction = Math.max(0, Math.round((1 - summary.length / dialogue.length) * 100));
            proofValue.textContent = `${reduction}%`;
            proof.classList.add("visible");
            copyButton.style.display = "inline-flex";
        }

    } catch (err) {
        summaryText.textContent = `Error: ${err.message}`;
        console.error("Summarization Error:", err);
    } finally {
        submitButton.disabled = false;
        still.classList.remove("is-processing");
    }
});
</script>
</body>
</html>
